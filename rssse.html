<script>
  // Google Analytics loads only after the visitor accepts analytics cookies.
  (function () {
    var measurementId = 'G-5GXQG08G76';
    var storageKey = 'euclid-analytics-consent';
    var loaded = false;

    window.dataLayer = window.dataLayer || [];
    window.gtag = window.gtag || function () { window.dataLayer.push(arguments); };
    window.gtag('consent', 'default', {
      ad_storage: 'denied',
      ad_user_data: 'denied',
      ad_personalization: 'denied',
      analytics_storage: 'denied'
    });

    function getChoice() {
      try { return localStorage.getItem(storageKey); } catch (e) { return null; }
    }

    function setChoice(value) {
      try { localStorage.setItem(storageKey, value); } catch (e) {}
    }

    function deleteCookie(name) {
      var hostParts = location.hostname.split('.');
      var domains = ['', location.hostname];
      if (hostParts.length > 2) domains.push('.' + hostParts.slice(-2).join('.'));
      domains.forEach(function (domain) {
        document.cookie = name + '=; Max-Age=0; path=/; SameSite=Lax' + (domain ? '; domain=' + domain : '');
      });
    }

    function clearAnalyticsCookies() {
      deleteCookie('_ga');
      deleteCookie('_gid');
      deleteCookie('_gat');
      deleteCookie('_ga_' + measurementId.replace(/^G-/, ''));
    }

    function loadAnalytics() {
      if (loaded) return;
      loaded = true;
      window.gtag('consent', 'update', { analytics_storage: 'granted' });
      var script = document.createElement('script');
      script.async = true;
      script.src = 'https://www.googletagmanager.com/gtag/js?id=' + encodeURIComponent(measurementId);
      document.head.appendChild(script);
      window.gtag('js', new Date());
      window.gtag('config', measurementId);
    }

    function declineAnalytics() {
      window.gtag('consent', 'update', {
        ad_storage: 'denied',
        ad_user_data: 'denied',
        ad_personalization: 'denied',
        analytics_storage: 'denied'
      });
      clearAnalyticsCookies();
    }

    function ensureConsentUi() {
      if (document.getElementById('analytics-consent-style')) return;
      var style = document.createElement('style');
      style.id = 'analytics-consent-style';
      style.textContent =
        '.analytics-consent-banner{position:fixed;left:16px;right:16px;bottom:16px;z-index:3000;max-width:560px;margin:0 auto;padding:22px 24px;border:2px solid #fff;border-radius:8px;background:#000;color:#fff;box-shadow:0 18px 44px rgba(0,0,0,.36)}' +
        '.analytics-consent-title{margin:0 0 10px;font-family:"Space Grotesk",system-ui,-apple-system,"Segoe UI",sans-serif;font-size:30px;font-weight:700;line-height:1;letter-spacing:0;text-transform:uppercase;color:#fff}' +
        '.analytics-consent-banner p{margin:0 0 16px;font-family:"Source Sans 3",system-ui,-apple-system,"Segoe UI",sans-serif;font-size:15px;font-weight:500;line-height:1.42;letter-spacing:0;color:#fff}' +
        '.analytics-consent-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px}' +
        '.analytics-consent-actions button{min-height:42px;border:2px solid #fff;border-radius:6px;padding:9px 14px;font:700 15px "Source Sans 3",system-ui,-apple-system,"Segoe UI",sans-serif;letter-spacing:0;text-transform:none;cursor:pointer;transition:background 180ms ease,color 180ms ease,transform 180ms ease}' +
        '.analytics-consent-actions button:hover{transform:translateY(-1px)}' +
        '.analytics-consent-accept{background:#fff;color:#000}.analytics-consent-decline{background:#000;color:#fff}' +
        '.analytics-consent-decline:hover{background:#fff;color:#000}.analytics-consent-accept:hover{background:#e6e6e6;color:#000}' +
        '@media(max-width:560px){.analytics-consent-banner{left:10px;right:10px;bottom:10px;padding:18px}.analytics-consent-title{font-size:24px}.analytics-consent-actions{grid-template-columns:1fr}.analytics-consent-actions button{min-height:46px;font-size:15px}}';
      document.head.appendChild(style);
    }

    function removeBanner() {
      var existing = document.getElementById('analytics-consent-banner');
      if (existing) existing.remove();
    }

    function showSettingsButton() {
      if (document.documentElement.dataset.analyticsSettingsBound === 'true') return;
      document.documentElement.dataset.analyticsSettingsBound = 'true';
      document.addEventListener('click', function (event) {
        var link = event.target.closest && event.target.closest('[data-analytics-settings]');
        if (!link) return;
        event.preventDefault();
        showBanner();
      });
    }

    function showBanner() {
      ensureConsentUi();
      removeBanner();
      var banner = document.createElement('div');
      banner.id = 'analytics-consent-banner';
      banner.className = 'analytics-consent-banner';
      banner.setAttribute('role', 'dialog');
      banner.setAttribute('aria-live', 'polite');
      banner.setAttribute('aria-label', 'Analytics cookie settings');
      banner.innerHTML =
        '<h2 class="analytics-consent-title">We value your privacy</h2>' +
        '<p>We use cookies to understand how our visitors use these pages. Please choose whether to accept these analytics.</p>' +
        '<div class="analytics-consent-actions">' +
        '<button type="button" class="analytics-consent-decline">Reject</button>' +
        '<button type="button" class="analytics-consent-accept">Accept</button>' +
        '</div>';
      banner.querySelector('.analytics-consent-accept').addEventListener('click', function () {
        setChoice('granted');
        loadAnalytics();
        removeBanner();
        showSettingsButton();
      });
      banner.querySelector('.analytics-consent-decline').addEventListener('click', function () {
        setChoice('denied');
        declineAnalytics();
        removeBanner();
        showSettingsButton();
      });
      document.body.appendChild(banner);
    }

    function initConsent() {
      ensureConsentUi();
      var choice = getChoice();
      if (choice === 'granted') {
        loadAnalytics();
        showSettingsButton();
      } else if (choice === 'denied') {
        declineAnalytics();
        showSettingsButton();
      } else {
        showBanner();
      }
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initConsent);
    } else {
      initConsent();
    }
  })();
</script>
<script>
  // Apply an explicit theme choice before paint, otherwise follow the device.
  (function () {
    try {
      var t = localStorage.getItem('euclid-theme-choice');
      var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', (t === 'light' || t === 'dark') ? t : (systemDark ? 'dark' : 'light'));
    } catch (e) {}
  })();
</script>

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  /* ── Theme tokens ──────────────────────────────────────────── */
  /* Dark mode is sampled directly from the Euclid image of M78:
       deep violet-tinged void · lavender nebula cores · copper dust clouds.
     Page surfaces step from a near-black void up through dim plum cards;
     primary text is a warm star-light off-white, body copy a soft
     lavender-grey. The accent overrides at the bottom of this block return
     `--purple-*` to actual purples (lavender, lilac) and `--orange-*` to
     warm rusts/coppers, replacing the amber/olive defaults declared in the
     brand-tokens block below — so light mode keeps the brand palette while
     dark mode wears M78. */
  :root, html[data-theme="dark"] {
    --space-black:  #0E0A18;   /* cosmic void · primary page base */
    --space-deep:   #15101F;   /* alt sections — one step lifted */
    --space-mid:    #1F1730;   /* card surfaces — dim plum */
    --cream:        #F2EAD9;   /* primary text · warm star-light · AA 14:1 */
    --grey-mid:     #BBA9CB;   /* body · soft lavender-grey */
    --grey-dark:    #8A7E96;   /* captions · dusted mauve */
    --border:       #332846;   /* muted plum border */
    --border-bright:#B86E36;   /* copper dust accent */

    --nav-bg-top:      rgba(14,10,24,0.82);
    --nav-bg-scrolled: rgba(14,10,24,0.94);
    --card-tint:       rgba(168,139,217,0.10);  /* lavender wash */
    --card-tint-hover: rgba(168,139,217,0.22);
    --slide-scrim:     linear-gradient(180deg, rgba(14,10,24,0.35) 0%, rgba(14,10,24,0.7) 70%, rgba(14,10,24,0.9) 100%);
    --slide-filter:    brightness(0.85);
    --tactile-logo-filter: brightness(0) invert(1) sepia(10%) saturate(390%) hue-rotate(337deg) brightness(100%) contrast(94%) drop-shadow(0 10px 24px rgba(0,0,0,0.24));
    --tactile-model-color: #9F7ADA;
    --tactile-model-emissive: #1B102A;
    --tactile-model-rim: #C9A9F0;

    /* M78 accent overrides — only apply in dark mode.
       Higher specificity than the :root brand block, so light mode keeps
       the amber/olive defaults declared further down. */
    --purple-primary:#A88BD9;  /* lavender — nebula core */
    --purple-light:  #C9A9F0;  /* brighter lilac highlight */
    --purple-lighter:#E4D2F2;  /* palest lilac — bright cores */
    --purple-dark:   #6E54A3;  /* deep violet */
    --purple-nebula: #2A1A45;  /* very dark plum (depth) */
    --orange-primary:#B86E36;  /* rust copper — dust clouds */
    --orange-glow:   #D4824A;  /* brighter rust glow */
  }
  html[data-theme="light"] {
    --space-black:  #F2F2F2;   /* off-white page base */
    --space-deep:   #EBEDF0;   /* alt sections */
    --space-mid:    #E2E5E9;   /* cards */
    --cream:        #293740;   /* primary text · AA 11.1:1 on off-white */
    --grey-mid:     #3A4653;   /* body */
    --grey-dark:    #5E6B77;   /* captions */
    --border:       #D1D6DC;
    --border-bright:#736436;

    --nav-bg-top:      rgba(242,242,242,0.88);
    --nav-bg-scrolled: rgba(242,242,242,0.94);
    --card-tint:       rgba(115,100,54,0.06);
    --card-tint-hover: rgba(115,100,54,0.14);
    --slide-scrim:     linear-gradient(180deg, rgba(242,242,242,0.2) 0%, rgba(242,242,242,0.55) 70%, rgba(242,242,242,0.82) 100%);
    --slide-filter:    brightness(1);
    --tactile-logo-filter: drop-shadow(0 10px 24px rgba(0,0,0,0.18));
    --tactile-model-color: #736436;
    --tactile-model-emissive: #F2F2F2;
    --tactile-model-rim: #D99C2B;
  }

  /* ── Brand tokens (unchanged between themes) ──────────────── */
  /* Six-colour palette:
       #000000 ink · #293740 slate · #736436 olive ·
       #D99C2B amber · #BBD8F2 pale blue · #F2F2F2 off-white
     Note: legacy names retained for compatibility —
     "purple" now maps to the amber accent (#D99C2B) and pale blue tint,
     "orange" now maps to the olive accent (#736436). */
  :root {
    --ink:           #000000;
    --purple-primary:#D99C2B; --purple-light:#E8B454; --purple-lighter:#BBD8F2;
    --purple-dark:#A47520;    --purple-nebula:#4A3514;
    --orange-primary:#736436; --orange-glow:#8E7E45;

    /* Accurate-name aliases for the same six-colour palette.
       Prefer these in new code; the legacy --purple-* / --orange-*
       tokens are kept above so existing refs continue to work. */
    --amber-primary:  var(--purple-primary);   /* #D99C2B */
    --amber-light:    var(--purple-light);     /* #E8B454 */
    --amber-dark:     var(--purple-dark);      /* #A47520 */
    --amber-deep:     var(--purple-nebula);    /* #4A3514 */
    --paleblue:       var(--purple-lighter);   /* #BBD8F2 */
    --olive-primary:  var(--orange-primary);   /* #736436 */
    --olive-light:    var(--orange-glow);      /* #8E7E45 */

    --font-display:'Space Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
    --font-heading:'Space Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
    --font-accent:'Space Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
    --font-campaign:'Space Grotesk',system-ui,-apple-system,'Segoe UI',sans-serif;
    --font-script:'Grand Hotel',cursive;
    --font-body:'Source Sans 3',system-ui,-apple-system,'Segoe UI',sans-serif;
    --font-mono:'Space Mono',monospace;
    --ease-space:cubic-bezier(0.25,0,0,1);
  }

  html { scroll-behavior: smooth; }
  html, body {
    background: var(--space-black); color: var(--cream);
    font-family: var(--font-body); -webkit-font-smoothing: antialiased;
    min-height: 100%;
    transition: background 400ms var(--ease-space), color 400ms var(--ease-space);
  }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }
  #root { min-height: 100%; }
  button { cursor: pointer; font-family: var(--font-body); }
  a { color: inherit; }
  a:focus-visible, button:focus-visible { outline: 2px solid var(--purple-light); outline-offset: 3px; border-radius: 4px; }

  .skip-link {

  /* ── Carousel slide backgrounds (theme-aware via CSS) ─────── */
  .slide-bg {
    position: absolute; inset: 0; z-index: 0;
    background-size: cover; background-position: center;
    transition: filter 400ms var(--ease-space);
    transform-origin: center center;
  }
  /* When .slide-bg is a <video> (used for slide 1 in light mode), make it
     behave like a cover background: fill the container and crop to centre. */
  video.slide-bg {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center;
    display: block;
  }

  /* Subtle Ken-Burns drift on every slide. Animations run only while a
     slide is active; removing .is-active resets them so they restart
     each time the slide returns. Range kept small for a minimal effect. */
  @keyframes euclid-slide-zoom {
    from { transform: scale(1.00); }
    to   { transform: scale(1.05); }
  }

  /* Ken-Burns drift applied to slides 2 and 3 only. Slide 1 hosts an
     autoplaying video which already supplies its own motion, so it
     opts out of the scale animation. */
  .euclid-slide.is-active .slide-bg-2,
  .euclid-slide.is-active .slide-bg-3 { animation: euclid-slide-zoom 16s var(--ease-space) both; }

  @media (prefers-reduced-motion: reduce) {
    .euclid-slide.is-active .slide-bg-2,
    .euclid-slide.is-active .slide-bg-3 { animation: none; }
  }
  /* Slide 1 — The Dark Universe Detective.
     Plays an autoplaying ESA clip in both themes (rendered as a real
     <video> in Hero.jsx). In dark mode we apply the slide brightness
     filter so the clip sits at the same level as the rest of the
     dark-mode imagery. */
  html[data-theme="dark"]  .slide-bg-1 { filter: var(--slide-filter); }
  .slide-bg-1 { background-position: center; transform-origin: center center; }
  video.slide-bg-1--cosmic-web {
    transform: none;
  }
  /* Slide 2 — A Mystery of Missing Matter.
     Use cover so the image fills the frame (no letterboxing). */
  html[data-theme="light"] .slide-bg-2 { background-image: url('images/Euclid_s_view_of_the_Perseus_cluster_of_galaxies.jpg'); }
  html[data-theme="dark"]  .slide-bg-2 { background-image: url('images/PR_FS2_stripe_image.png'); filter: brightness(0.6); }
  /* Slide 3 — Cosmic Clues */
  html[data-theme="light"] .slide-bg-3 { background-image: url('images/slide3_bg.jpg'); }
  html[data-theme="dark"]  .slide-bg-3 { background-image: url('images/slide3_bg_bw.jpg'); filter: var(--slide-filter); }
  /* Slide 4 — Mapping the Dark Universe.
     Show the entire mosaic uncropped: contain instead of cover, no transform. */

const HERO_BACKGROUNDS = {
  light: {
    video: 'images/orig-2301_026_AR_EN_hero.mp4',
    poster: 'images/orig-2301_026_AR_EN_hero_poster.jpg',
  },

function HeroBackground({ theme, isNarrow }) {
  const videoRef = React.useRef(null);
  const [shouldLoadVideo, setShouldLoadVideo] = React.useState(false);
  const [videoReady, setVideoReady] = React.useState(false);
  const activeTheme = theme === 'dark' ? 'dark' : 'light';
  const background = HERO_BACKGROUNDS[activeTheme];

  React.useEffect(() => {
    setVideoReady(false);
    const saveData = Boolean(navigator.connection && navigator.connection.saveData);
    const reducedMotion = Boolean(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);

    if (saveData || reducedMotion) {
      setShouldLoadVideo(false);
      return undefined;
    }

    const start = () => setShouldLoadVideo(true);
    if ('requestIdleCallback' in window) {
      const idleId = window.requestIdleCallback(start, { timeout: 900 });
      return () => window.cancelIdleCallback(idleId);
    }
    const timer = window.setTimeout(start, 350);
    return () => window.clearTimeout(timer);
  }, [activeTheme]);

  React.useEffect(() => {
    const video = videoRef.current;
    if (!video || !shouldLoadVideo) return undefined;

    const tryPlay = () => {
      const playPromise = video.play();
      if (playPromise && typeof playPromise.catch === 'function') playPromise.catch(() => {});
    };

    if (!('IntersectionObserver' in window)) {
      tryPlay();
      return undefined;
    }

    const observer = new IntersectionObserver(entries => {
      const visible = entries[0] && entries[0].isIntersecting;
      if (visible) {
        tryPlay();
      } else {
        video.pause();
      }
    }, { threshold: 0.08 });

    observer.observe(video);
    return () => observer.disconnect();
  }, [shouldLoadVideo, background.video]);

  return (
    <>
      <div
        className={`slide-bg slide-bg-1 ${activeTheme === 'dark' ? 'slide-bg-1--cosmic-web' : ''}`}
        aria-hidden="true"
        style={{
          backgroundImage: `url("${background.poster}")`,
          backgroundSize: 'cover',
          backgroundPosition: 'center center',
        }}
      />
      {shouldLoadVideo && (
        <video
          key={background.video}
          ref={videoRef}
          className={`slide-bg slide-bg-1 ${activeTheme === 'dark' ? 'slide-bg-1--cosmic-web' : ''}`}
          src={background.video}
          poster={background.poster}
          autoPlay
          muted
          loop
          playsInline
          preload="metadata"
          aria-hidden="true"
          onCanPlay={() => setVideoReady(true)}
          style={{
            width: '100%',
            height: '100%',
            objectFit: 'cover',
            objectPosition: 'center center',
            opacity: videoReady ? 1 : 0,
            transition: 'opacity 500ms var(--ease-space)',
          }}
        />
      )}
    </>
  );
}

function A2390DarkMatterSlide() {
  const [spot, setSpot] = React.useState({ x: 50, y: 55 });
  const [active, setActive] = React.useState(false);
  const [locked, setLocked] = React.useState(false);
  const [audioEnabled, setAudioEnabled] = React.useState(false);
  const [radius, setRadius] = React.useState(150);
  const frameRef = React.useRef(null);
  const audioRef = React.useRef(null);

  React.useEffect(() => {
    const syncRadius = () => {
      const rect = frameRef.current ? frameRef.current.getBoundingClientRect() : { width: window.innerWidth, height: window.innerHeight };
      setRadius(Math.max(96, Math.min(190, Math.min(rect.width, rect.height) * 0.2)));
    };
    syncRadius();
    window.addEventListener('resize', syncRadius);
    return () => window.removeEventListener('resize', syncRadius);
  }, []);

  React.useEffect(() => () => {
    if (!audioRef.current) return;
    const { ctx, carrier, shimmer } = audioRef.current;
    try {
      carrier.stop();
      shimmer.stop();
      ctx.close();
    } catch (error) {}
    audioRef.current = null;
  }, []);

  const rimWidth = Math.max(12, radius * 0.14);
  const revealRadius = Math.max(58, radius - rimWidth);

  const getAudioEngine = React.useCallback(() => {
    if (typeof window === 'undefined') return null;
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return null;

    if (!audioRef.current) {
      const ctx = new AudioContext();
      const carrier = ctx.createOscillator();
      const shimmer = ctx.createOscillator();
      const carrierGain = ctx.createGain();
      const shimmerGain = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      const master = ctx.createGain();

      carrier.type = 'sine';
      shimmer.type = 'triangle';
      carrier.frequency.value = 180;
      shimmer.frequency.value = 360;
      carrierGain.gain.value = 0.7;
      shimmerGain.gain.value = 0.06;
      filter.type = 'bandpass';
      filter.frequency.value = 520;
      filter.Q.value = 7;
      master.gain.value = 0;

      carrier.connect(carrierGain);
      shimmer.connect(shimmerGain);
      carrierGain.connect(filter);
      shimmerGain.connect(filter);
      filter.connect(master);
      master.connect(ctx.destination);
      carrier.start();
      shimmer.start();
      audioRef.current = { ctx, carrier, shimmer, carrierGain, shimmerGain, filter, master };
    }

    if (audioRef.current.ctx.state === 'suspended') {
      audioRef.current.ctx.resume().catch(() => {});
    }
    return audioRef.current;
  }, []);

  const primeSonification = React.useCallback(() => {
    const engine = getAudioEngine();
    if (!engine) return;
    const now = engine.ctx.currentTime;
    engine.master.gain.setTargetAtTime(0.001, now, 0.04);
  }, [getAudioEngine]);

  const fadeAudio = React.useCallback(() => {
    const engine = audioRef.current;
    if (!engine) return;
    engine.master.gain.setTargetAtTime(0, engine.ctx.currentTime, 0.12);
  }, []);

  const measurePurpleIntensity = React.useCallback((xPercent, yPercent, screenRadius) => {
    const frame = frameRef.current;
    if (!frame) return 0;

    const rect = frame.getBoundingClientRect();
    const map = A2390_PURPLE_INTENSITY;
    const rows = map.length;
    const cols = map[0].length;
    const displayedWidth = Math.max(rect.width, rect.height);
    const displayedHeight = displayedWidth;
    const offsetX = (rect.width - displayedWidth) / 2;
    const offsetY = (rect.height - displayedHeight) / 2;
    const centerX = ((xPercent / 100) * rect.width - offsetX) / displayedWidth;
    const centerY = ((yPercent / 100) * rect.height - offsetY) / displayedHeight;
    const sampleRadiusX = screenRadius / displayedWidth;
    const sampleRadiusY = screenRadius / displayedHeight;
    const sampleSteps = 4;
    let total = 0;
    let count = 0;

    function sampleMap(nx, ny) {
      const x = Math.max(0, Math.min(1, nx)) * (cols - 1);
      const y = Math.max(0, Math.min(1, ny)) * (rows - 1);
      const x0 = Math.floor(x);
      const y0 = Math.floor(y);
      const x1 = Math.min(cols - 1, x0 + 1);
      const y1 = Math.min(rows - 1, y0 + 1);
      const tx = x - x0;
      const ty = y - y0;
      const top = map[y0][x0] * (1 - tx) + map[y0][x1] * tx;
      const bottom = map[y1][x0] * (1 - tx) + map[y1][x1] * tx;
      return top * (1 - ty) + bottom * ty;
    }

    for (let gy = -sampleSteps; gy <= sampleSteps; gy++) {
      for (let gx = -sampleSteps; gx <= sampleSteps; gx++) {
        const dx = gx / sampleSteps;
        const dy = gy / sampleSteps;
        if (dx * dx + dy * dy > 1) continue;
        total += sampleMap(centerX + dx * sampleRadiusX, centerY + dy * sampleRadiusY);
        count++;
      }
    }

    return count ? Math.min(1, total / count) : 0;
  }, []);

  const playSonification = React.useCallback((xPercent, yPercent, enabled = true) => {
    if (!enabled) {
      fadeAudio();
      return;
    }
    const engine = getAudioEngine();
    if (!engine) return;
    const intensity = measurePurpleIntensity(xPercent, yPercent, revealRadius);
    const shaped = Math.pow(Math.max(0, Math.min(1, intensity)), 0.58);
    const now = engine.ctx.currentTime;
    engine.master.gain.setTargetAtTime(0.018 + shaped * 0.16, now, 0.055);
    engine.carrier.frequency.setTargetAtTime(95 + shaped * 1050, now, 0.055);
    engine.shimmer.frequency.setTargetAtTime(180 + shaped * 2300, now, 0.055);
    engine.filter.frequency.setTargetAtTime(260 + shaped * 3600, now, 0.055);
    engine.filter.Q.setTargetAtTime(4 + shaped * 16, now, 0.055);
    engine.shimmerGain.gain.setTargetAtTime(0.01 + shaped * 0.19, now, 0.055);
  }, [fadeAudio, getAudioEngine, measurePurpleIntensity, revealRadius]);

  const updateSpot = React.useCallback(event => {
    const rect = event.currentTarget.getBoundingClientRect();
    const x = ((event.clientX - rect.left) / rect.width) * 100;
    const y = ((event.clientY - rect.top) / rect.height) * 100;
    const nextSpot = {
      x: Math.max(0, Math.min(100, x)),
      y: Math.max(0, Math.min(100, y)),
    };
    setSpot(nextSpot);
    playSonification(nextSpot.x, nextSpot.y, audioEnabled);
  }, [audioEnabled, playSonification]);

  const handleAudioToggle = React.useCallback(() => {
    const nextAudioEnabled = !audioEnabled;
    setAudioEnabled(nextAudioEnabled);
    if (nextAudioEnabled) {
      setActive(true);
      primeSonification();
      playSonification(spot.x, spot.y, true);
    } else {
      fadeAudio();
    }
  }, [audioEnabled, fadeAudio, playSonification, primeSonification, spot.x, spot.y]);

  React.useEffect(() => {
    if (!audioEnabled) fadeAudio();
  }, [audioEnabled, fadeAudio]);

  const handleKeyDown = event => {
    const step = event.shiftKey ? 10 : 4;
    if (event.key === 'ArrowLeft' || event.key === 'ArrowRight' || event.key === 'ArrowUp' || event.key === 'ArrowDown') {
      event.preventDefault();
      setActive(true);
      setSpot(prev => {
        const nextSpot = {
          x: Math.max(0, Math.min(100, prev.x + (event.key === 'ArrowRight' ? step : event.key === 'ArrowLeft' ? -step : 0))),
          y: Math.max(0, Math.min(100, prev.y + (event.key === 'ArrowDown' ? step : event.key === 'ArrowUp' ? -step : 0))),
        };
        playSonification(nextSpot.x, nextSpot.y, audioEnabled);
        return nextSpot;
      });
    }
  };

  const revealed = active || locked;
  const magnifierViewBox = 512;
  const glassCenter = 184;
  const glassRadius = 136;
  const glassStroke = 38;
  const glassOuterRadius = glassRadius + glassStroke / 2;
  const magnifierSize = (radius * 2 * magnifierViewBox) / (glassOuterRadius * 2);
  const magnifierOffset = `${(glassCenter / magnifierViewBox) * 100}%`;
  const lensMask = locked
    ? 'circle(150% at 50% 50%)'
    : `circle(${revealed ? revealRadius : 0}px at ${spot.x}% ${spot.y}%)`;

  return (
    <section
      ref={frameRef}
      aria-label="Abell 2390 dark matter map reveal"
      tabIndex={0}
      onPointerMove={event => {
        setActive(true);
        if (audioEnabled) primeSonification();
        updateSpot(event);
      }}
      onPointerEnter={event => {
        setActive(true);
        if (audioEnabled) primeSonification();
        updateSpot(event);
      }}
      onPointerDown={event => {
        setActive(true);
        if (event.pointerType !== 'mouse' && event.currentTarget.setPointerCapture) {
          event.currentTarget.setPointerCapture(event.pointerId);
        }
        if (audioEnabled) primeSonification();
        updateSpot(event);
      }}
      onPointerUp={event => {
        if (event.pointerType !== 'mouse') {
          if (event.currentTarget.releasePointerCapture) {
            event.currentTarget.releasePointerCapture(event.pointerId);
          }
          setActive(false);
          fadeAudio();
        }
      }}
      onPointerCancel={() => {
        setActive(false);
        fadeAudio();
      }}
      onPointerLeave={() => {
        if (!locked) setActive(false);
        fadeAudio();
      }}
      onFocus={() => setActive(true)}
      onBlur={() => {
        if (!locked) setActive(false);
        fadeAudio();
      }}
      onKeyDown={handleKeyDown}
      style={{
        position: 'relative',
        width: '100%',
        minHeight: 'clamp(360px, 75vh, 800px)',
        overflow: 'hidden',
        background: '#000',
        cursor: locked ? 'default' : 'none',
        touchAction: 'none',
      }}>
      <img
        src={A2390_VISIBLE}
        alt=""
        aria-hidden="true"
        loading="lazy"
        style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover', objectPosition: 'center', display: 'block' }}
      />
      <img
        src={A2390_DARK_MATTER}
        alt=""
        aria-hidden="true"
        loading="lazy"
        style={{
          position: 'absolute',
          inset: 0,
          width: '100%',
          height: '100%',
          objectFit: 'cover',
          objectPosition: 'center',
          display: 'block',
          opacity: revealed ? 1 : 0,
          clipPath: lensMask,
          transition: 'none',
          willChange: 'clip-path',
        }}
      />
      {!locked && (
        <svg aria-hidden="true" focusable="false" viewBox="0 0 512 512" style={{
          position: 'absolute',
          left: `${spot.x}%`,
          top: `${spot.y}%`,
          width: magnifierSize,
          height: magnifierSize,
          overflow: 'visible',
          transform: `translate(-${magnifierOffset}, -${magnifierOffset})`,
          opacity: revealed ? 1 : 0,
          pointerEvents: 'none',
          transition: 'none',
          zIndex: 2,
        }}>
          <line
            x1="290" y1="290" x2="438" y2="438"
            stroke="rgba(3,3,5,0.96)"
            strokeWidth="62"
            strokeLinecap="round"

          <circle

      <div style={{

      <a href="https://www.euclid-ec.org/euclid-starts-seeing-darkness/"

// show a different image in dark mode. The swap reuses the existing

// index.html, so no extra runtime theme wiring is needed.

// should stay uncropped, OR pass `className` to drive sizing from CSS
// (useful when sizing is theme-dependent), OR fall back to `minHeight`
// for cinematic hero-style bands that crop to fill.
//
// Background defaults to #000 so cropped imagery sits on void; pass
// "transparent" if the band should let the page background show through
// any letterbox area (e.g. when the band hosts a panoramic strip on a
// page with a non-black background).

function loadScriptOnce(src) {
  window.__euclidScriptPromises = window.__euclidScriptPromises || {};
  if (!window.__euclidScriptPromises[src]) {
    window.__euclidScriptPromises[src] = new Promise((resolve, reject) => {
      const existing = document.querySelector(`script[src="${src}"]`);
      if (existing) {
        existing.addEventListener('load', resolve, { once: true });
        existing.addEventListener('error', reject, { once: true });
        if (existing.dataset.loaded === 'true') resolve();
        return;
      }
      const script = document.createElement('script');
      script.src = src;
      script.async = true;
      script.onload = () => { script.dataset.loaded = 'true'; resolve(); };
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }
  return window.__euclidScriptPromises[src];
}

function StlModelViewer({ src, label }) {
  const mountRef = React.useRef(null);
  const [status, setStatus] = React.useState('Loading 3D model…');

  React.useEffect(() => {
    let disposed = false;
    let renderer;
    let controls;
    let animationId;
    let resizeObserver;

    async function init() {
      try {
        const importModule = window.__euclidImportModule || (window.__euclidImportModule = new Function('url', 'return import(url)'));
        const THREE = await importModule('https://esm.sh/three@0.128.0');
        const { STLLoader } = await importModule('https://esm.sh/three@0.128.0/examples/jsm/loaders/STLLoader.js');
        const { OrbitControls } = await importModule('https://esm.sh/three@0.128.0/examples/jsm/controls/OrbitControls.js');
        if (disposed || !mountRef.current) return;

        const mount = mountRef.current;
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.outputEncoding = THREE.sRGBEncoding;
        renderer.domElement.style.touchAction = 'none';
        renderer.domElement.style.cursor = 'grab';
        mount.appendChild(renderer.domElement);

        const themeValue = (name, fallback) => (
          getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback
        );
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(34, 1, 0.1, 100);
        camera.position.set(0, 0.12, 5.6);
        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.enablePan = true;
        controls.screenSpacePanning = true;
        controls.enableZoom = true;
        controls.minDistance = 1.8;
        controls.maxDistance = 10;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.45;
        controls.target.set(0, 0, 0);
        controls.update();
        controls.addEventListener('start', () => {
          controls.autoRotate = false;
          renderer.domElement.style.cursor = 'grabbing';
        });
        controls.addEventListener('end', () => {
          renderer.domElement.style.cursor = 'grab';
        });
        scene.add(new THREE.HemisphereLight('#FFFFFF', themeValue('--space-mid', '#35204D'), 0.9));
        const key = new THREE.DirectionalLight('#FFFFFF', 1.15);
        key.position.set(3, 4, 5);
        scene.add(key);
        const rim = new THREE.DirectionalLight(themeValue('--tactile-model-rim', '#C9A9F0'), 0.7);
        rim.position.set(-4, 1.5, -2);
        scene.add(rim);

        const group = new THREE.Group();
        scene.add(group);

        const resize = () => {
          if (!mount) return;
          const rect = mount.getBoundingClientRect();
          const width = Math.max(rect.width, 1);
          const height = Math.max(rect.height, 1);
          renderer.setSize(width, height, true);
          camera.aspect = width / height;
          camera.updateProjectionMatrix();
        };
        resizeObserver = new ResizeObserver(resize);
        resizeObserver.observe(mount);
        resize();

        new STLLoader().load(src, geometry => {
          if (disposed) return;
          geometry.computeVertexNormals();
          geometry.computeBoundingBox();
          const box = geometry.boundingBox;
          const center = new THREE.Vector3();
          const size = new THREE.Vector3();
          box.getCenter(center);
          box.getSize(size);
          geometry.translate(-center.x, -center.y, -center.z);
          const maxDim = Math.max(size.x, size.y, size.z) || 1;
          const material = new THREE.MeshStandardMaterial({
            color: themeValue('--tactile-model-color', '#9F7ADA'),
            roughness: 0.62,
            metalness: 0.02,
            emissive: themeValue('--tactile-model-emissive', '#1B102A'),
            emissiveIntensity: 0.05,
            side: THREE.DoubleSide,
          });
          const mesh = new THREE.Mesh(geometry, material);
          mesh.scale.setScalar(2.2 / maxDim);
          mesh.rotation.x = -Math.PI / 2;
          mesh.rotation.z = -0.04;
          group.add(mesh);
          setStatus('');
        }, undefined, error => {
          window.__euclidStlViewerError = error && error.message ? error.message : String(error || '');
          if (!disposed) setStatus('The 3D model could not be loaded.');
        });

        const clock = new THREE.Clock();
        const animate = () => {
          animationId = window.requestAnimationFrame(animate);
          const elapsed = clock.getElapsedTime();
          group.rotation.y = Math.sin(elapsed * 0.45) * 0.12;
          group.rotation.x = Math.sin(elapsed * 0.32) * 0.04;
          if (controls) controls.update();
          renderer.render(scene, camera);
        };
        animate();
      } catch (error) {
        window.__euclidStlViewerError = error && error.message ? error.message : String(error || '');
        if (!disposed) setStatus('The 3D viewer could not be started.');
      }
    }

    init();

    return () => {
      disposed = true;
      if (animationId) window.cancelAnimationFrame(animationId);
      if (resizeObserver) resizeObserver.disconnect();
      if (controls) controls.dispose();
      if (renderer) {
        renderer.dispose();
        if (renderer.domElement && renderer.domElement.parentNode) {
          renderer.domElement.parentNode.removeChild(renderer.domElement);
        }
      }
    };
  }, [src]);

  return (
    <div aria-label={label} style={{ position: 'relative', width: '100%', height: '100%' }}>
      <div ref={mountRef} style={{ position: 'absolute', inset: 0, touchAction: 'none' }} />
      {status && (
        <div style={{
          position: 'absolute', inset: 0,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          color: 'rgba(242,242,242,0.78)',
          fontFamily: 'var(--font-body)', fontSize: 14,
          letterSpacing: '0.04em', textTransform: 'uppercase',
        }}>
          {status}
        </div>
      )}
    </div>
  );
}

          Image Credits: ESA / Euclid / Euclid Consortium / NASA. Cosmic Web Visualisation by Frank Summers, Space Telescope Science Institute. Simulation by Martin White, UC Berkeley and Lars Hernquist, Harvard University.
        </p>

        {/* Copyright line — sits below the socials and image credits as a
           quiet sign-off. Year is hard-coded to the exhibition year so the
           page reads consistently year-round; bump in the next cycle. */}
        <div style={{
          textAlign: 'center', paddingTop: 20,
          borderTop: '1px solid var(--border)',
          fontFamily: 'var(--font-body)', fontSize: 12,
          color: 'var(--grey-dark)', letterSpacing: '0.04em',
        }}>
          © <a href="https://eucliduk.net" target="_blank" rel="noopener noreferrer"
            style={{
              color: 'var(--grey-mid)', textDecoration: 'none',
              borderBottom: '1px solid transparent',
              transition: 'color 200ms var(--ease-space), border-color 200ms var(--ease-space)',
            }}
            onMouseEnter={e => { e.currentTarget.style.color = 'var(--cream)'; e.currentTarget.style.borderBottomColor = 'var(--purple-light)'; }}
            onMouseLeave={e => { e.currentTarget.style.color = 'var(--grey-mid)'; e.currentTarget.style.borderBottomColor = 'transparent'; }}>
            Euclid UK
          </a> 2026
          <span aria-hidden="true" style={{ margin: '0 8px', color: 'var(--border)' }}>·</span>
          <a href="#cookie-settings" data-analytics-settings
            style={{
              color: 'var(--grey-mid)',
              fontWeight: 700,
              textDecoration: 'underline',
              textUnderlineOffset: 3,
              textDecorationThickness: 1,
              transition: 'color 200ms var(--ease-space)',
            }}
            onMouseEnter={e => { e.currentTarget.style.color = 'var(--cream)'; }}
            onMouseLeave={e => { e.currentTarget.style.color = 'var(--grey-mid)'; }}>
            Cookie settings
          </a>
        </div>

      </div>
    </footer>
  );
}

Object.assign(window, { EuclidFooter });

function BackToTopButton() {
  const [visible, setVisible] = React.useState(false);
  React.useEffect(() => {
    const onScroll = () => setVisible(window.scrollY > window.innerHeight * 0.75);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  const scrollTop = () => {
    const top = document.getElementById('top');
    if (top) top.scrollIntoView({ behavior: 'smooth', block: 'start' });
    else window.scrollTo({ top: 0, behavior: 'smooth' });
  };
  return (
    <button
      type="button"
      aria-label="Back to top"
      onClick={scrollTop}
      style={{
        position: 'fixed',
        right: 'clamp(16px, 3vw, 32px)',
        bottom: 'clamp(16px, 3vw, 32px)',
        zIndex: 120,
        width: 48,
        height: 48,
        borderRadius: '50%',
        border: '1px solid var(--border)',
        background: 'var(--nav-bg-scrolled)',
        color: 'var(--cream)',
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        boxShadow: '0 12px 32px rgba(0,0,0,0.28)',
        backdropFilter: 'blur(14px)',
        WebkitBackdropFilter: 'blur(14px)',
        opacity: visible ? 1 : 0,
        pointerEvents: visible ? 'auto' : 'none',
        transform: visible ? 'translateY(0)' : 'translateY(10px)',
        transition: 'opacity 220ms var(--ease-space), transform 220ms var(--ease-space), background 220ms var(--ease-space)',
      }}
      onMouseEnter={e => {
        e.currentTarget.style.background = 'var(--card-tint-hover)';
        e.currentTarget.style.transform = 'translateY(-2px)';
      }}
      onMouseLeave={e => {
        e.currentTarget.style.background = 'var(--nav-bg-scrolled)';
        e.currentTarget.style.transform = visible ? 'translateY(0)' : 'translateY(10px)';
      }}>
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none"
           stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
        <path d="M12 19V5" />
        <path d="M5 12l7-7 7 7" />
      </svg>
    </button>
  );
}

function FloatingChartermark({ visible }) {
  const imageStyle = {
    width: 'clamp(72px, 8vw, 112px)',
    height: 'auto',
    display: 'block',
  };

  return (
    <a
      href="https://royalsociety.org/science-events-and-lectures/summer-science-exhibition/"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Selected for the Royal Society Summer Science Exhibition 2026"
      style={{
        position: 'fixed',
        left: 'clamp(14px, 3vw, 32px)',
        bottom: 'clamp(14px, 3vw, 32px)',
        zIndex: 118,
        display: 'block',
        opacity: visible ? 1 : 0,
        pointerEvents: visible ? 'auto' : 'none',
        transform: visible ? 'translateY(0)' : 'translateY(12px)',
        transition: 'opacity 220ms var(--ease-space), transform 220ms var(--ease-space), filter 220ms var(--ease-space)',
        filter: 'drop-shadow(0 12px 26px rgba(0,0,0,0.35))',
      }}
      onMouseEnter={e => { e.currentTarget.style.transform = visible ? 'translateY(-2px)' : 'translateY(12px)'; }}
      onMouseLeave={e => { e.currentTarget.style.transform = visible ? 'translateY(0)' : 'translateY(12px)'; }}>
      <img
        src="images/logos/DES9400_6_SSE 2026_Chartermark_red.png"
        className="logo-img--light-only"
        alt=""
        aria-hidden="true"
        style={imageStyle}
      />
      <img
        src="images/logos/DES9400_6_SSE 2026_Chartermark.png"
        className="logo-img--dark-only"
        alt=""
        aria-hidden="true"
        style={imageStyle}
      />
    </a>
  );
}

  /* ===== App bootstrap ===== */
  function useChartermarkHandoff() {
    const [active, setActive] = React.useState(false);

    React.useEffect(() => {
      const heroChartermark = document.querySelector('[data-chartermark="hero"]');

      if (!heroChartermark || !('IntersectionObserver' in window)) {
        const onScroll = () => setActive(window.scrollY > window.innerHeight * 0.85);
        onScroll();
        window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }

      const observer = new IntersectionObserver(entries => {
        const entry = entries[0];
        setActive(!entry.isIntersecting && window.scrollY > 0);
      }, { threshold: 0 });

      observer.observe(heroChartermark);
      return () => observer.disconnect();
    }, []);

    return active;
  }

  function useTheme() {
    const getSystemTheme = React.useCallback(() => (
      window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
    ), []);
    const getStoredTheme = React.useCallback(() => {
      try {
        const saved = localStorage.getItem('euclid-theme-choice');
        return saved === 'light' || saved === 'dark' ? saved : null;
      } catch (e) {
        return null;
      }
    }, []);
    const [theme, setTheme] = React.useState(() => document.documentElement.getAttribute('data-theme') || getStoredTheme() || getSystemTheme());
    React.useEffect(() => {
      document.documentElement.setAttribute('data-theme', theme);
    }, [theme]);
    React.useEffect(() => {
      const media = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)');
      if (!media) return undefined;
      const onChange = e => {
        if (!getStoredTheme()) setTheme(e.matches ? 'dark' : 'light');
      };
      media.addEventListener('change', onChange);
      return () => media.removeEventListener('change', onChange);
    }, [getStoredTheme]);
    const toggle = React.useCallback(() => {
      setTheme(prev => {
        const next = prev === 'dark' ? 'light' : 'dark';
        try { localStorage.setItem('euclid-theme-choice', next); } catch (e) {}
        if (window.__euclidToggleSound) window.__euclidToggleSound(next === 'dark');
        return next;
      });
    }, []);
    return [theme, toggle];
  }

  function App() {
    const [theme, toggleTheme] = useTheme();
    const chartermarkHandoffActive = useChartermarkHandoff();
    return (
      <>
        <EuclidNav theme={theme} onToggleTheme={toggleTheme} showCampaignBrand={chartermarkHandoffActive} />
        <main id="main-content" tabIndex={-1}>
          <EuclidHero theme={theme} />
          <ScienceSection />
          <NewsSection />
          <DetectiveSection />
        </main>
        <EuclidFooter />
        <FloatingChartermark visible={chartermarkHandoffActive} />
        <BackToTopButton />
      </>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
